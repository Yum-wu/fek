<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="FEK Banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0c1a14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0.32" r="0.85">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#glow)"/>

  <!-- 闪电标记 -->
  <polygon points="135,70 75,215 120,215 90,320 200,150 145,150" fill="url(#accent)"/>

  <!-- 主标题 -->
  <text x="230" y="212" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="104" font-weight="800" fill="#ffffff">FEK</text>

  <!-- 副标题 -->
  <text x="86" y="262" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="32" font-weight="600" fill="url(#accent)">Adaptive AI Execution Engine · 自适应 AI 执行引擎</text>

  <!-- 说明 -->
  <text x="86" y="306" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="21" fill="#cbd5e1">一个任务，自动选出最优多模型计算图 —— 并持续权衡成本 / 延迟 / 质量</text>

  <!-- 装饰线 -->
  <rect x="86" y="330" width="220" height="6" rx="3" fill="url(#accent)"/>
</svg>
