# FEK 持续集成：在多个 Python 版本上自动运行测试与冒烟检查。
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: 测试套件 (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 语法检查（零依赖编译全部模块）
        run: python -m compileall -q fek examples web tests

      - name: 运行单元测试
        run: python -m unittest discover -s tests -v

  smoke:
    name: 冒烟测试（导入 + 离线 Demo）
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 内核可导入 & 基础执行
        run: |
          python -c "from fek import FEKKernel; k=FEKKernel(); print(k.run('What is 2+2?').summary())"

      - name: 离线示例可运行
        run: python examples/basic_demo.py
